# ============================================================
# CosyVoice TTS API - Docker Compose 生产部署
#
# 使用方法:
#   1. 将本文件放到 CosyVoice 项目根目录
#   2. docker compose build
#   3. docker compose up -d
#   4. docker compose logs -f cosyvoice-tts
#
# 挂载说明:
#   - 本地模型目录 → 容器 pretrained_models/ (避免重复下载)
#   - 本地 wetext 缓存 → 容器对应位置 (避免重复下载)
#   - speakers/ 目录双向同步
#   - static/wavs/ 输出目录
# ============================================================

services:
  cosyvoice-tts:
    build:
      context: .                    # docker build context = 项目根目录
      dockerfile: Dockerfile
    image: cosyvoice-tts-api:latest
    container_name: cosyvoice-tts
    restart: unless-stopped

    # ══════════════════════════════════════════════════
    #  GPU 配置 (L20 / A800)
    #  device_ids: 指定使用哪张 GPU
    #    ["0"]       → 第 1 张
    #    ["1"]       → 第 2 张
    #    ["0", "1"]  → 前 2 张
    #  也可用 count: all 使用全部 GPU
    # ══════════════════════════════════════════════════
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
        limits:
          memory: 32G

    # ══════════════════════════════════════════════════
    #  端口映射
    # ══════════════════════════════════════════════════
    ports:
      - "${API_PORT:-8080}:8080"

    # ══════════════════════════════════════════════════
    #  数据卷挂载
    # ══════════════════════════════════════════════════
    volumes:
      # ── 模型目录 (宿主机 → 容器, 避免每次构建重新下载) ──
      # 修改左侧路径为你的实际模型存放位置
      - ${MODEL_HOST_DIR:-./pretrained_models}:/workspace/CosyVoice/pretrained_models

      # ── wetext 缓存 (macOS 本地开发时的缓存路径) ──
      # Linux 服务器上改为: /root/.cache/modelscope/hub/pengzhendong/wetext
      - ${WETEXT_CACHE_DIR:-/Users/zhangyong/.cache/modelscope/hub/pengzhendong/wetext}:/root/.cache/modelscope/hub/pengzhendong/wetext

      # ── 说话人目录 (双向同步) ──
      - ./speakers:/workspace/CosyVoice/speakers

      # ── 生成音频输出 ──
      - ./static/wavs:/workspace/CosyVoice/static/wavs

      # ── 日志 ──
      - ./logs:/workspace/CosyVoice/logs

    # ══════════════════════════════════════════════════
    #  环境变量
    # ══════════════════════════════════════════════════
    environment:
      # 模型路径 (相对于 /workspace/CosyVoice)
      - MODEL_DIR=${MODEL_DIR:-pretrained_models/CosyVoice2-0.5B}

      # API 配置
      - HOST=0.0.0.0
      - PORT=8080
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-4}    # L20: 4-6, A800: 8-12

      # GPU 优化 (L20/A800 建议全开)
      - LOAD_JIT=${LOAD_JIT:-true}               # TorchScript 加速
      - LOAD_TRT=${LOAD_TRT:-false}              # TensorRT (需先构建 .plan)
      - LOAD_VLLM=${LOAD_VLLM:-false}            # vLLM (需额外安装)
      - FP16=${FP16:-true}                        # 半精度推理

      # NVIDIA 环境
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

      # PyTorch 优化
      - CUDA_LAUNCH_BLOCKING=0
      - TORCH_CUDNN_V8_API_ENABLED=1

    # ══════════════════════════════════════════════════
    #  健康检查
    # ══════════════════════════════════════════════════
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s          # 模型加载需要 1-3 分钟

    # ══════════════════════════════════════════════════
    #  日志 & 共享内存
    # ══════════════════════════════════════════════════
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    shm_size: "4g"                  # PyTorch DataLoader 共享内存

    # ══════════════════════════════════════════════════
    #  网络
    # ══════════════════════════════════════════════════
    networks:
      - cosyvoice-net

# ══════════════════════════════════════════════════════════════
#  自定义网络
#  避开已占用网段: 172.18.x, 172.24.x, 172.28.x, 172.128.x
#  使用 172.30.0.0/16
# ══════════════════════════════════════════════════════════════
networks:
  cosyvoice-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1
